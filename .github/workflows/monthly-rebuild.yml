name: Monthly site rebuild

on:
  schedule:
    # 1st of each month at 05:00 UTC — refreshes salary data & "Updated Month Year" dates
    - cron: "0 5 1 * *"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify deploy
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail \
            || echo "Deploy hook failed — check NETLIFY_DEPLOY_HOOK secret"
