name: Auto-publish blog post

on:
  schedule:
    # 8am UTC every other day
    - cron: "0 8 */2 * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but do not commit)"
        required: false
        default: "false"
      keyword:
        description: "Override keyword id or text (leave blank to use next in queue)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            ARGS="$ARGS --keyword \"${{ github.event.inputs.keyword }}\""
          fi
          npx tsx scripts/generateArticle.ts $ARGS
          echo "Generated at $(date -u)"

      - name: Check for new files
        id: check_changes
        run: |
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ data/blog-queue-path.ts
          SLUG=$(git diff --cached --name-only | grep "content/blog/" | head -1 | xargs basename -s .md 2>/dev/null || echo "unknown")
          git commit -m "blog: auto-publish ${SLUG}

          Generated by PathVerdict article engine.
          Trigger: ${{ github.event_name }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD

      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "Article generated and pushed successfully"
          else
            echo "No new article generated (queue empty or slug already exists)"
          fi
