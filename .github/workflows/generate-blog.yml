name: Auto-publish blog post

on:
  schedule:
    # Tuesday 09:00 UTC and Friday 09:00 UTC
    - cron: "0 9 * * 2"
    - cron: "0 9 * * 5"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but do not commit)"
        required: false
        default: "false"
      keyword:
        description: "Override keyword (leave blank to use next in queue)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            ARGS="$ARGS --keyword \"${{ github.event.inputs.keyword }}\""
          fi
          npx tsx scripts/generateArticle.ts $ARGS
          echo "Generated at $(date -u)"

      - name: Check for new files
        id: check_changes
        run: |
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ data/keywords.json
          SLUG=$(git diff --cached --name-only | grep "content/blog/" | head -1 | xargs basename -s .md || echo "unknown")
          git commit -m "blog: auto-publish ${SLUG}

          Generated by SalaryVerdict article engine.
          Trigger: ${{ github.event_name }} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD

      - name: Trigger Netlify deploy hook
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: |
          if [ -n "$NETLIFY_DEPLOY_HOOK" ]; then
            curl -s -X POST "$NETLIFY_DEPLOY_HOOK" || echo "Deploy hook call failed (non-fatal)"
          else
            echo "No deploy hook set — skipping (Netlify auto-deploys on push)"
          fi

      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Article generated and pushed successfully"
          else
            echo "ℹ️ No new article generated (queue empty or slug already exists)"
          fi
